# ---------------------------------------------------------------------------
# Production Ceph cluster overlay (MON + MGR + OSD + RGW)
# ---------------------------------------------------------------------------
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.ceph.yml up -d
#
# Starts a full single-box Ceph Reef cluster alongside the platform stack.
# The backend connects to the RGW at http://ceph-rgw:7480 via Docker DNS.
#
# On first boot a one-shot init container:
#   1. Configures pool replication for a single-OSD deployment
#   2. Applies RGW production tuning
#   3. Creates the S3 user (from S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY)
#
# For an external multi-node Ceph cluster (recommended for HA production),
# skip this file and point the backend to the external RGW via
# S3_ENDPOINT_URL in .env.
#
# Works on Windows (Docker Desktop), Linux, and macOS.
# ---------------------------------------------------------------------------

services:
  # ---- Ceph Monitor --------------------------------------------------------
  # Bootstraps the cluster on first run (generates FSID, keyrings, config).
  ceph-mon:
    image: quay.io/ceph/daemon:latest-reef
    container_name: ceph-mon
    restart: unless-stopped
    command: mon
    environment:
      MON_IP: 172.28.0.10
      CEPH_PUBLIC_NETWORK: 172.28.0.0/16
    volumes:
      - ceph-etc:/etc/ceph
      - ceph-lib:/var/lib/ceph
    networks:
      ceph-net:
        ipv4_address: 172.28.0.10
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD", "ceph", "-s"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ---- Ceph Manager --------------------------------------------------------
  ceph-mgr:
    image: quay.io/ceph/daemon:latest-reef
    container_name: ceph-mgr
    restart: unless-stopped
    command: mgr
    volumes:
      - ceph-etc:/etc/ceph
      - ceph-lib:/var/lib/ceph
    depends_on:
      ceph-mon:
        condition: service_healthy
    networks:
      - ceph-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # ---- Ceph OSD (directory-backed, single OSD) -----------------------------
  # Uses a Docker volume instead of a raw block device so it works on every
  # OS including Docker Desktop on Windows and macOS.
  ceph-osd:
    image: quay.io/ceph/daemon:latest-reef
    container_name: ceph-osd
    restart: unless-stopped
    command: osd_directory
    volumes:
      - ceph-etc:/etc/ceph
      - ceph-lib:/var/lib/ceph
    depends_on:
      ceph-mon:
        condition: service_healthy
    networks:
      - ceph-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ---- Ceph RGW (S3-compatible gateway) ------------------------------------
  ceph-rgw:
    image: quay.io/ceph/daemon:latest-reef
    container_name: ceph-rgw
    restart: unless-stopped
    command: rgw
    ports:
      - "${CEPH_RGW_PORT:-7480}:7480"
    volumes:
      - ceph-etc:/etc/ceph
      - ceph-lib:/var/lib/ceph
    depends_on:
      ceph-mon:
        condition: service_healthy
    networks:
      - ceph-net
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:7480/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ---- One-shot cluster initialisation -------------------------------------
  # Runs once after RGW is healthy: sets pool sizes, applies tuning, and
  # creates the S3 user.  Exits 0 and does not restart.
  ceph-init:
    image: quay.io/ceph/daemon:latest-reef
    container_name: ceph-init
    restart: "no"
    volumes:
      - ceph-etc:/etc/ceph
      - ceph-lib:/var/lib/ceph
    depends_on:
      ceph-rgw:
        condition: service_healthy
    networks:
      - ceph-net
    environment:
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        echo '=== Ceph cluster init ==='

        for i in $$(seq 1 30); do
          ceph -s >/dev/null 2>&1 && break
          echo "Waiting for cluster ($$i/30)..."
          sleep 3
        done

        # Single-OSD: set default and existing pool replication to 1
        ceph config set global osd_pool_default_size 1
        ceph config set global osd_pool_default_min_size 1
        for pool in $$(ceph osd pool ls 2>/dev/null); do
          ceph osd pool set "$$pool" size 1 --yes-i-really-mean-it 2>/dev/null || true
          ceph osd pool set "$$pool" min_size 1 2>/dev/null || true
        done

        # RGW production tuning (centralised config store)
        ceph config set client.rgw rgw_thread_pool_size 512
        ceph config set client.rgw rgw_max_put_size 104857600
        ceph config set client.rgw rgw_enable_usage_log true
        ceph config set client.rgw rgw_enable_apis "s3, admin"

        # Create S3 user (idempotent)
        if radosgw-admin user info --uid=sandhi >/dev/null 2>&1; then
          echo "S3 user 'sandhi' already exists"
        else
          radosgw-admin user create \
            --uid=sandhi \
            --display-name="Sandhi AI" \
            --access-key="$$S3_ACCESS_KEY_ID" \
            --secret-key="$$S3_SECRET_ACCESS_KEY"
          echo "Created S3 user 'sandhi'"
        fi

        echo '=== Ceph cluster init complete ==='
        ceph -s

  # ---- Backend overrides for Ceph S3 connectivity --------------------------
  backend:
    environment:
      OBJECT_STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://ceph-rgw:7480}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:?Set S3_ACCESS_KEY_ID in .env}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:?Set S3_SECRET_ACCESS_KEY in .env}
      S3_BUCKET: ${S3_BUCKET:-sandhi-brd-docs}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ADDRESSING_STYLE: path
      S3_AUTO_CREATE_BUCKET: "true"
      S3_TCP_KEEPALIVE: "true"
      S3_SIGNATURE_VERSION: s3v4
    networks:
      default:
      ceph-net:
    depends_on:
      ceph-rgw:
        condition: service_healthy

networks:
  ceph-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  ceph-etc:
  ceph-lib:
