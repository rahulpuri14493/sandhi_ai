[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
markers =
    vector_e2e: optional live vector DB checks (requires env secrets; skipped by default).
    sql_e2e: optional live SQL checks for MySQL/SQL Server (env or local .env).
filterwarnings =
    ignore::DeprecationWarning
