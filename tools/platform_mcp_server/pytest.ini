[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_functions = test_*
addopts = -v --tb=short
markers =
    unit: Fast pure tests (no HTTP).
    integration: FastAPI TestClient with mocked backend HTTP.
    e2e: Full JSON-RPC flow in-process and/or optional live service checks.
    live: Optional tests against a running server (requires env URL).
    vector_e2e: optional execute_platform_tool against real vector backends (env-based credentials).
    sql_e2e: optional execute_platform_tool against real MySQL/SQL Server (env or local .env).
    azure_blob_e2e: optional execute_platform_tool against real Azure Blob (env or local .env).
