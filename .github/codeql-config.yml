# CodeQL config for GitHub default Code Scanning only (do not add a separate CodeQL workflow while default setup is enabled).
# https://docs.github.com/en/code-security/code-scanning/automatically-scanning-your-code-for-vulnerabilities/configuring-code-scanning
name: "Sandhi AI CodeQL config"

paths-ignore:
  - "scripts/setup_env.py"
  - "tools/platform_mcp_server/tests/**"
  - "backend/tests/**"
  - "frontend/tests/**"

# Operator-scoped MCP tools (tenant + encrypted creds), not anonymous HTTP input.
query-filters:
  - exclude:
      id: py/sql-injection
      paths:
        - "tools/platform_mcp_server/execution_sql.py"
        - "tools/platform_mcp_server/execution_artifact.py"
        - "tools/platform_mcp_server/**"
  - exclude:
      id: py/path-injection
      paths:
        - "tools/platform_mcp_server/execution_common.py"
        - "tools/platform_mcp_server/**"
  - exclude:
      id: py/incomplete-url-substring-sanitization
      paths:
        - "tools/platform_mcp_server/**"
