# Fork PRs: build/validate only; no push to registries (none configured here). Least privilege: contents read.
name: Docker Image CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: agent_marketplace

jobs:
  build-and-test:
    name: Build and test Docker Compose stack
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env for CI
        run: |
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "POSTGRES_DB=agent_marketplace" >> .env
          echo "SECRET_KEY=ci-secret-key" >> .env
          echo "MCP_INTERNAL_SECRET=ci-mcp-internal-secret" >> .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build images with Docker Compose
        run: docker compose build

      - name: Start the stack
        run: docker compose up -d

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "Backend is up"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Backend did not become ready"
              docker compose logs backend
              exit 1
            fi
            sleep 2
          done

      - name: Wait for frontend to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend is up"
              break
            fi
            if [ "$i" -eq 15 ]; then
              echo "Frontend did not become ready"
              docker compose logs frontend
              exit 1
            fi
            sleep 2
          done

      - name: Show stack logs on failure
        if: failure()
        run: docker compose logs

      - name: Stop the stack
        if: always()
        run: docker compose down -v || true
