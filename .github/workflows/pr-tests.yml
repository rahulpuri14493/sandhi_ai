# Run frontend and backend tests on every pull request
name: PR Tests

on:
  pull_request:
    branches: ["**"]

env:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: agent_marketplace

permissions:
  contents: read

jobs:
  docker-compose-stack:
    name: Docker Compose stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env for CI
        run: |
          echo "POSTGRES_USER=postgres" >> .env
          echo "POSTGRES_PASSWORD=postgres" >> .env
          echo "POSTGRES_DB=agent_marketplace" >> .env
          echo "SECRET_KEY=ci-secret-key" >> .env
          echo "MCP_INTERNAL_SECRET=ci-mcp-internal-secret" >> .env

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Show stack logs on build/start failure
        if: failure()
        run: docker compose logs --tail=200

      - name: Wait for backend
        run: |
          for i in $(seq 1 45); do
            if curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            [ "$i" -eq 45 ] && (docker compose logs backend; exit 1)
            sleep 2
          done

      - name: Wait for frontend (if in stack)
        run: |
          if docker compose config --services 2>/dev/null | grep -qx frontend; then
            for i in $(seq 1 20); do
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "Frontend ready"
                break
              fi
              [ "$i" -eq 20 ] && (docker compose logs frontend; exit 1)
              sleep 2
            done
          else
            echo "No frontend service in stack, skipping"
          fi

      - name: Stop stack
        if: always()
        run: docker compose down -v || true

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key
      OBJECT_STORAGE_BACKEND: local
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Clean stale test/coverage artifacts
        run: |
          python -m coverage erase || true
          rm -f .coverage || true
          rm -rf .pytest_cache || true
          find . -type d -name "__pycache__" -prune -exec rm -rf {} +

      - name: Run pytest with coverage gate (>=80%)
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=76 -v

  platform-mcp-tests:
    name: Platform MCP server tests (unit + integration + e2e)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/platform_mcp_server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mcp-${{ hashFiles('tools/platform_mcp_server/requirements.txt', 'tools/platform_mcp_server/pytest.ini') }}
          restore-keys: |
            ${{ runner.os }}-pip-mcp-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # tools/platform_mcp_server/tests: test_tools.py, test_execution_helpers_unit.py,
      # test_jsonrpc_http_integration.py, test_mcp_protocol_e2e.py; test_mcp_live_e2e.py skips without PLATFORM_MCP_E2E_BASE_URL
      - name: Run platform MCP pytest suite
        run: python -m pytest tests -c pytest.ini --rootdir . -v --tb=short

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage (fail if <80%)
        run: npm run test -- --run --coverage
        env:
          CI: true
