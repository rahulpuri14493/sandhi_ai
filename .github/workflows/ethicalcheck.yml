# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# EthicalCheck addresses the critical need to continuously security test APIs in development and in production.

# EthicalCheck provides the industry’s only free & automated API security testing service that uncovers security vulnerabilities using OWASP API list.
# Developers relies on EthicalCheck to evaluate every update and release, ensuring that no APIs go to production with exploitable vulnerabilities.

# You develop the application and API, we bring complete and continuous security testing to you, accelerating development.

# Know your API and Applications are secure with EthicalCheck – our free & automated API security testing service.

# How EthicalCheck works?
# EthicalCheck functions in the following simple steps.
# 1. Security Testing.
# Provide your OpenAPI specification or start with a public Postman collection URL.
# EthicalCheck instantly instrospects your API and creates a map of API endpoints for security testing.
# It then automatically creates hundreds of security tests that are non-intrusive to comprehensively and completely test for authentication, authorizations, and OWASP bugs your API. The tests addresses the OWASP API Security categories including OAuth 2.0, JWT, Rate Limit etc.

# 2. Reporting.
# EthicalCheck generates security test report that includes all the tested endpoints, coverage graph, exceptions, and vulnerabilities.
# Vulnerabilities are fully triaged, it contains CVSS score, severity, endpoint information, and OWASP tagging.


# This is a starter workflow to help you get started with EthicalCheck Actions

name: EthicalCheck Workflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  # Customize trigger events based on your DevSecOps processes.
  push:
    branches: ["main"]
  schedule:
    - cron: '29 23 * * 0'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger_ethicalcheck:
    permissions:
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: ubuntu-latest
    env:
      ETHICALCHECK_OAS_URL: ${{ vars.ETHICALCHECK_OAS_URL }}
      APISEC_PROJECT: ${{ vars.APISEC_PROJECT }}
      APISEC_REGION: ${{ vars.APISEC_REGION }}
      APISEC_HOST: ${{ vars.APISEC_HOST }}
      APISEC_USERNAME: ${{ secrets.APISEC_USERNAME }}
      APISEC_PASSWORD: ${{ secrets.APISEC_PASSWORD }}

    steps:
      - name: Validate EthicalCheck inputs
        run: |
          if [ -z "${ETHICALCHECK_OAS_URL}" ] || [ -z "${APISEC_PROJECT}" ] || [ -z "${APISEC_USERNAME}" ] || [ -z "${APISEC_PASSWORD}" ]; then
            echo "Missing one or more required settings:"
            echo " - Variable: ETHICALCHECK_OAS_URL"
            echo " - Variable: APISEC_PROJECT"
            echo " - Secret: APISEC_USERNAME"
            echo " - Secret: APISEC_PASSWORD"
            exit 1
          fi

          # Guard against accidental trailing spaces/newlines in secrets/vars.
          for v in APISEC_USERNAME APISEC_PASSWORD APISEC_PROJECT ETHICALCHECK_OAS_URL; do
            value="${!v}"
            if [ "${value}" != "$(printf "%s" "${value}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')" ]; then
              echo "${v} contains leading/trailing whitespace. Please re-save it in GitHub Secrets/Variables."
              exit 1
            fi
          done

          echo "EthicalCheck inputs detected (values masked)."
          if [ -n "${APISEC_REGION}" ]; then
            echo "APISEC_REGION is set."
          else
            echo "APISEC_REGION is not set (optional)."
          fi

      - name: APIsec login preflight
        shell: bash
        run: |
          host="${APISEC_HOST:-https://cloud.apisec.ai}"
          # Trim accidental trailing slash so /login is not double-slashed.
          host="${host%/}"
          echo "APIsec login URL: ${host}/login"
          if [ -z "${APISEC_HOST}" ]; then
            echo "APISEC_HOST is not set; using default https://cloud.apisec.ai ."
            echo "If your tenant uses a different base URL, set repo variable APISEC_HOST to that origin (check the browser address bar or network tab on login)."
          fi
          payload=$(jq -n --arg u "${APISEC_USERNAME}" --arg p "${APISEC_PASSWORD}" '{username:$u,password:$p}')
          tmp=$(mktemp)
          code=$(curl -sS -o "$tmp" -w "%{http_code}" -H "Content-Type: application/json" -X POST -d "$payload" "${host}/login")
          resp=$(cat "$tmp")
          rm -f "$tmp"
          echo "HTTP status from login: ${code}"
          if ! echo "$resp" | jq -e . >/dev/null 2>&1; then
            echo "APIsec login returned non-JSON from ${host}/login (HTTP ${code})."
            echo "Preview (first 400 chars):"
            printf '%s' "$resp" | head -c 400
            echo
            echo "APISEC_HOST must be the same origin your browser uses for POST /login (usually https://cloud.apisec.ai)."
            echo "https://api.apisecapps.com is often a separate API surface, not the interactive login endpoint."
            exit 1
          fi
          key=$(echo "$resp" | jq -r 'if has("token") then "token" elif has("message") then "message" else "unknown" end')
          if [ "$key" != "token" ]; then
            msg=$(echo "$resp" | jq -r '.message // "Unknown login response from APIsec"')
            echo "APIsec login preflight failed: ${msg}"
            echo "Use the same email/username and password you use for APIsec password login (not GitHub)."
            echo "If you only sign in with Google/Microsoft SSO, set a password in APIsec or use an account that has password login."
            echo "Re-save secrets APISEC_USERNAME / APISEC_PASSWORD (no quotes)."
            exit 1
          fi
          echo "APIsec login preflight passed against ${host}."

      - name: EthicalCheck scan (script mode)
        shell: bash
        run: |
          curl -fsSL "https://raw.githubusercontent.com/apisec-inc/apisec-run-scan/v1.0.7/apisec-run-scan.sh" -o apisec-run-scan.sh
          chmod +x apisec-run-scan.sh
          host="${APISEC_HOST:-https://cloud.apisec.ai}"
          host="${host%/}"
          ./apisec-run-scan.sh \
            --username "${APISEC_USERNAME}" \
            --password "${APISEC_PASSWORD}" \
            --project "${APISEC_PROJECT}" \
            --profile "Master" \
            --scanner "${APISEC_REGION}" \
            --outputfile "ethicalcheck-results.sarif" \
            --refresh-playbooks "" \
            --host "${host}" \
            --emailReport "" \
            --fail-on-vuln-severity "" \
            --openAPISpecUrl "${ETHICALCHECK_OAS_URL}" \
            --openAPISpecFile "" \
            --internal_OpenAPISpecUrl "" \
            --specType "" \
            --profileScanner "" \
            --envName "" \
            --authName "" \
            --app_username "" \
            --app_password "" \
            --app_endPointUrl "" \
            --app_token_param "" \
            --header_1 "" \
            --baseUrl "" \
            --category ""

      - name: Upload sarif file to repository
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ./ethicalcheck-results.sarif

