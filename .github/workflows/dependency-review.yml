name: Dependency Review

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

jobs:
  enforce-no-ecdsa:
    name: Enforce no python-ecdsa
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies and audit tools
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt pipdeptree pip-audit

      - name: Audit Python dependencies for high/critical vulnerabilities
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          print("Running pip-audit (JSON, local env)...")
          try:
            out = subprocess.check_output(
              ["pip-audit", "--local", "--format", "json", "--desc", "off"],
              text=True,
            )
          except subprocess.CalledProcessError as e:
            # pip-audit exits non-zero when it finds vulns; we still want its JSON.
            out = e.output or ""

          if not out.strip():
            print("pip-audit produced no output")
            sys.exit(0)

          try:
            data = json.loads(out)
          except json.JSONDecodeError:
            print("pip-audit output was not valid JSON; exiting without failing CI.")
            sys.exit(0)

          vulns = data.get("vulnerabilities") if isinstance(data, dict) else data
          if not isinstance(vulns, list):
            print("pip-audit JSON did not contain a vulnerabilities list; exiting without failing CI.")
            sys.exit(0)

          high_or_critical = []
          for v in vulns:
            sev = str(v.get("severity", "")).lower()
            if sev in ("high", "critical"):
              high_or_critical.append(v)

          if not high_or_critical:
            print("pip-audit: no high/critical vulnerabilities found.")
            sys.exit(0)

          print("pip-audit: high/critical vulnerabilities detected:")
          for v in high_or_critical:
            name = v.get("package", {}).get("name")
            version = v.get("package", {}).get("version")
            sev = v.get("severity")
            vid = v.get("id") or v.get("vuln_id")
            print(f"- {name}=={version} severity={sev} id={vid}")

          sys.exit(1)
          PY

      - name: Fail if python-jose or ecdsa exists in dependency graph
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          tree = json.loads(subprocess.check_output(["pipdeptree", "--json"], text=True))
          blocked = {"ecdsa", "python-jose"}
          found = {}

          for node in tree:
            package = node.get("package", {})
            key = package.get("key")
            if key in blocked:
              found[key] = package.get("installed_version", "unknown")
            for dep in node.get("dependencies", []):
              dkey = dep.get("key")
              if dkey in blocked:
                found[dkey] = dep.get("installed_version", "unknown")

          if found:
            print("Blocked packages detected in dependency graph:")
            for name, version in sorted(found.items()):
              print(f"- {name}=={version}")
            sys.exit(1)

          print("Dependency graph check passed: no python-jose/ecdsa present.")
          PY

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    needs: enforce-no-ecdsa
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          comment-summary-in-pr: always
          fail-on-severity: high
          # Block python-ecdsa from being introduced through dependency changes.
          deny-packages: pkg:pypi/ecdsa
          # Wait for dependency-submission (or other SBOM) jobs so head SHA has a snapshot.
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 180
