version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: sandhi-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agent_marketplace}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sandhi-backend
    restart: unless-stopped
    command: python run.py
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent_marketplace}
      A2A_ADAPTER_URL: http://a2a-openai-adapter:8080
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      a2a-openai-adapter:
        condition: service_started

  a2a-openai-adapter:
    build:
      context: ./tools/a2a_openai_adapter
      dockerfile: Dockerfile
    container_name: a2a-openai-adapter
    restart: unless-stopped
    ports:
      - "8080:8080"
    # No OPENAI_* env needed: platform sends openai_url/openai_api_key/openai_model per request in metadata

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sandhi-frontend
    env_file:
      - .env
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data: