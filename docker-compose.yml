services:
  # Redis does not log individual GET/SET by default (would be extremely noisy).
  # Set REDIS_LOGLEVEL=verbose in .env for more server messages, or enable profile redis-trace below.
  redis:
    image: redis:7-alpine
    container_name: sandhi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_LOGLEVEL: ${REDIS_LOGLEVEL:-notice}
    command: ["redis-server", "--loglevel", "${REDIS_LOGLEVEL:-notice}"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Streams every Redis command to container logs (dev/debug only). Start with:
  #   docker compose --profile redis-trace up -d
  # Then: docker compose logs -f redis-command-trace
  redis-command-trace:
    image: redis:7-alpine
    container_name: sandhi-redis-command-trace
    profiles: ["redis-trace"]
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    command:
      - sh
      - -c
      - until redis-cli -h redis ping 2>/dev/null; do sleep 1; done; exec redis-cli -h redis MONITOR

  db:
    image: postgres:15-alpine
    container_name: sandhi-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agent_marketplace}
    ports:
      - "5432:5432"   # host 5433 (avoid conflict with local Postgres on 5432)
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sandhi-backend
    init: true
    restart: unless-stopped
    command: python run.py
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent_marketplace}
      # Hot-reload API when ./backend is bind-mounted (set UVICORN_RELOAD=false for production)
      UVICORN_RELOAD: ${UVICORN_RELOAD:-true}
      A2A_ADAPTER_URL: http://a2a-openai-adapter:8080
      PLATFORM_MCP_SERVER_URL: http://platform-mcp-server:8081
      # Document storage backend: s3 (default) or local
      OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-s3}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-path}
      S3_CONNECT_TIMEOUT_SECONDS: ${S3_CONNECT_TIMEOUT_SECONDS:-5}
      S3_READ_TIMEOUT_SECONDS: ${S3_READ_TIMEOUT_SECONDS:-60}
      S3_MAX_POOL_CONNECTIONS: ${S3_MAX_POOL_CONNECTIONS:-100}
      S3_RETRY_MODE: ${S3_RETRY_MODE:-standard}
      S3_MAX_ATTEMPTS: ${S3_MAX_ATTEMPTS:-5}
      S3_AUTO_CREATE_BUCKET: ${S3_AUTO_CREATE_BUCKET:-false}
      S3_SIGNATURE_VERSION: ${S3_SIGNATURE_VERSION:-s3v4}
      S3_TCP_KEEPALIVE: ${S3_TCP_KEEPALIVE:-true}
      S3_OPERATION_RETRY_ATTEMPTS: ${S3_OPERATION_RETRY_ATTEMPTS:-4}
      S3_OPERATION_RETRY_BASE_DELAY_SECONDS: ${S3_OPERATION_RETRY_BASE_DELAY_SECONDS:-0.2}
      S3_OPERATION_RETRY_MAX_DELAY_SECONDS: ${S3_OPERATION_RETRY_MAX_DELAY_SECONDS:-2.0}
      S3_OPERATION_RETRY_JITTER_SECONDS: ${S3_OPERATION_RETRY_JITTER_SECONDS:-0.1}
      # Use dev default so stack runs without .env; set MCP_INTERNAL_SECRET in .env for production
      MCP_INTERNAL_SECRET: ${MCP_INTERNAL_SECRET:-dev-mcp-internal-secret}
      JOB_EXECUTION_BACKEND: ${JOB_EXECUTION_BACKEND:-celery}
      JOB_EXECUTION_STRICT_QUEUE: ${JOB_EXECUTION_STRICT_QUEUE:-false}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_WORKER_AUTOSCALE_MAX: ${CELERY_WORKER_AUTOSCALE_MAX:-16}
      CELERY_WORKER_AUTOSCALE_MIN: ${CELERY_WORKER_AUTOSCALE_MIN:-2}
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-4}
      CELERY_EXECUTE_MAX_RETRIES: ${CELERY_EXECUTE_MAX_RETRIES:-3}
      CELERY_EXECUTE_RETRY_BACKOFF_SECONDS: ${CELERY_EXECUTE_RETRY_BACKOFF_SECONDS:-5}
      # Debug logging (set to 1 to log JSON response previews; avoid in production)
      LOG_API_RESPONSE_BODY: ${LOG_API_RESPONSE_BODY:-1}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      a2a-openai-adapter:
        condition: service_started

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sandhi-celery-worker
    init: true
    restart: unless-stopped
    command: python run_celery_worker.py
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent_marketplace}
      # Restart worker when ./backend changes (set CELERY_AUTORELOAD=false for production)
      CELERY_AUTORELOAD: ${CELERY_AUTORELOAD:-true}
      JOB_EXECUTION_BACKEND: ${JOB_EXECUTION_BACKEND:-celery}
      JOB_EXECUTION_STRICT_QUEUE: ${JOB_EXECUTION_STRICT_QUEUE:-false}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_WORKER_AUTOSCALE_MAX: ${CELERY_WORKER_AUTOSCALE_MAX:-16}
      CELERY_WORKER_AUTOSCALE_MIN: ${CELERY_WORKER_AUTOSCALE_MIN:-2}
      CELERY_WORKER_CONCURRENCY: ${CELERY_WORKER_CONCURRENCY:-4}
      CELERY_EXECUTE_MAX_RETRIES: ${CELERY_EXECUTE_MAX_RETRIES:-3}
      CELERY_EXECUTE_RETRY_BACKOFF_SECONDS: ${CELERY_EXECUTE_RETRY_BACKOFF_SECONDS:-5}
      OBJECT_STORAGE_BACKEND: ${OBJECT_STORAGE_BACKEND:-s3}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
      MCP_INTERNAL_SECRET: ${MCP_INTERNAL_SECRET:-dev-mcp-internal-secret}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  a2a-openai-adapter:
    build:
      context: ./tools/a2a_openai_adapter
      dockerfile: Dockerfile
    container_name: a2a-openai-adapter
    init: true
    restart: unless-stopped
    ports:
      - "8080:8080"
    # No OPENAI_* env needed: platform sends openai_url/openai_api_key/openai_model per request in metadata

  platform-mcp-server:
    build:
      context: .
      dockerfile: tools/platform_mcp_server/Dockerfile
    container_name: platform-mcp-server
    init: true
    restart: unless-stopped
    # Lets containers reach services on the Docker host (e.g. Weaviate at host.docker.internal:8080). Docker Desktop sets this by default; Linux needs host-gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python run.py
    ports:
      - "8081:8081"
    volumes:
      # Live code (matches backend pattern); image COPY is overwritten at runtime
      - ./tools/platform_mcp_server:/app
      # Dockerfile copies this into /app; keep in sync when bind-mounting platform_mcp_server only
      - ./backend/core/artifact_contract.py:/app/artifact_contract.py:ro
      # Same job artifact files as backend (local OBJECT_STORAGE_BACKEND) for platform writes
      - ./backend/uploads/jobs:/uploads/jobs:ro
    environment:
      BACKEND_INTERNAL_URL: http://backend:8000
      MCP_INTERNAL_SECRET: ${MCP_INTERNAL_SECRET:-dev-mcp-internal-secret}
      PORT: "8081"
      UVICORN_RELOAD: ${UVICORN_RELOAD:-true}
      ARTIFACT_UPLOAD_ROOT: /uploads/jobs
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-east-1}
    env_file:
      - .env
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sandhi-frontend
    init: true
    env_file:
      - .env
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data: